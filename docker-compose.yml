# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15.3
    container_name: neuralcore-postgres
    environment:
      POSTGRES_DB: neuralcore
      POSTGRES_USER: neuralcore
      POSTGRES_PASSWORD: neuralcore123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralcore"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuralcore-network

  redis:
    image: redis:7.0-alpine
    container_name: neuralcore-redis
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuralcore-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: neuralcore-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__API_KEY: qdrant123
    networks:
      - neuralcore-network

  minio:
    image: minio/minio:latest
    container_name: neuralcore-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    networks:
      - neuralcore-network

  # ============================================
  # APPLICATION LAYER
  # ============================================
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: neuralcore-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://neuralcore:neuralcore123@postgres:5432/neuralcore
      REDIS_URL: redis://:redis123@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: qdrant123
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin123
      JWT_SECRET: your-super-secret-jwt-key
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - neuralcore-network

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: neuralcore-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://neuralcore:neuralcore123@postgres:5432/neuralcore
      REDIS_URL: redis://:redis123@redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: qdrant123
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - neuralcore-network

  engine:
    build:
      context: .
      dockerfile: infrastructure/docker/rust_engine.Dockerfile
    container_name: neuralcore-engine
    environment:
      RUST_LOG: info
      REDIS_URL: redis://:redis123@redis:6379
    depends_on:
      - redis
    networks:
      - neuralcore-network

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: neuralcore-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"  # Frontend 3001 pe, API 3000 pe
    depends_on:
      - api
    networks:
      - neuralcore-network

  # ============================================
  # REVERSE PROXY / LOAD BALANCER
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: neuralcore-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - frontend
    networks:
      - neuralcore-network

  # ============================================
  # MONITORING (Optional)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: neuralcore-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - neuralcore-network

  grafana:
    image: grafana/grafana:latest
    container_name: neuralcore-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"  # Grafana 3002 pe
    networks:
      - neuralcore-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  neuralcore-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
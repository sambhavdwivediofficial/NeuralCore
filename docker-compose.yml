version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neuralcore-postgres-dev
    environment:
      POSTGRES_DB: neuralcore
      POSTGRES_USER: neuralcore
      POSTGRES_PASSWORD: dev-password-change-in-prod
      # POSTGRES_INITDB_ARGS: -c shared_preload_libraries=pg_stat_statements,pg_trgm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - neuralcore-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralcore -d neuralcore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: neuralcore-redis-dev
    command: redis-server --requirepass dev-redis-password-change-in-prod --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - neuralcore-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev-redis-password-change-in-prod", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: neuralcore-qdrant-dev
    environment:
      QDRANT_API_KEY: dev-qdrant-api-key-change-in-prod
      QDRANT_READ_ONLY_MODE: "false"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - neuralcore-network
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:6333"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: neuralcore-api-dev
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      LOG_LEVEL: debug
      NEURALCORE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: neuralcore
      DATABASE_USER: neuralcore
      DATABASE_PASSWORD: dev-password-change-in-prod
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: dev-redis-password-change-in-prod
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_API_KEY: dev-qdrant-api-key-change-in-prod
      JWT_SECRET_KEY: dev-jwt-secret-key-change-in-prod-minimum-32-chars
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      WORKERS: "4"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
      - "9090:9090"
    volumes:
      - ./backend:/app
      - ./configs:/app/configs
    networks:
      - neuralcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    entrypoint: []
    # command: /app/start.sh
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  workers:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: neuralcore-workers-dev
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      LOG_LEVEL: debug
      NEURALCORE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: neuralcore
      DATABASE_USER: neuralcore
      DATABASE_PASSWORD: dev-password-change-in-prod
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: dev-redis-password-change-in-prod
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_API_KEY: dev-qdrant-api-key-change-in-prod
      CELERY_BROKER_URL: redis://:dev-redis-password-change-in-prod@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:dev-redis-password-change-in-prod@redis:6379/1
      WORKER_PREFETCH_MULTIPLIER: "4"
      WORKER_MAX_TASKS_PER_CHILD: "1000"
      WORKER_TIME_LIMIT: "3600"
      WORKER_SOFT_TIME_LIMIT: "3300"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
      - ./configs:/app/configs
    networks:
      - neuralcore-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    entrypoint: []
    # command: /app/start.sh
    command: celery -A workers.tasks worker --loglevel=info

  # frontend:
  #   build:
  #     context: .
  #     dockerfile: infrastructure/docker/frontend.Dockerfile
  #   container_name: neuralcore-frontend-dev
  #   environment:
  #     NODE_ENV: development
  #     NEXT_PUBLIC_API_URL: http://localhost:8000
  #     NEXT_PUBLIC_APP_URL: http://localhost:3000
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #     - /app/.next
  #   networks:
  #     - neuralcore-network
  #   depends_on:
  #     api:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3000"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   restart: unless-stopped
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: neuralcore-prometheus-dev
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - neuralcore-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: neuralcore-grafana-dev
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infrastructure/monitoring/grafana.json:/etc/grafana/provisioning/dashboards/neuralcore.json
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - neuralcore-network
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    image: grafana/loki:latest
    container_name: neuralcore-loki-dev
    volumes:
      - ./infrastructure/monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - neuralcore-network
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: neuralcore-postgres-exporter-dev
    environment:
      DATA_SOURCE_NAME: postgresql://neuralcore:dev-password-change-in-prod@postgres:5432/neuralcore?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - neuralcore-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: neuralcore-redis-exporter-dev
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: dev-redis-password-change-in-prod
    ports:
      - "9121:9121"
    networks:
      - neuralcore-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  neuralcore-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
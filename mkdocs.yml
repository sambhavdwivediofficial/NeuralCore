site_name: NeuralCore Documentation
site_description: Enterprise AI Infrastructure Platform — RAG, Agentic RAG, Multi-Agent Systems
site_author: Sambhav Dwivedi
site_url: https://www.sambhavdwivedi.in
repo_name: sambhavdwivediofficial/NeuralCore
repo_url: https://github.com/sambhavdwivediofficial/NeuralCore
copyright: "© 2026 Sambhav Dwivedi — All Rights Reserved"

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [backend]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            merge_init_into_class: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - API: api.md
  - Ingestion: ingestion.md
  - Retrieval: retrieval.md
  - Embeddings: embeddings.md
  - Memory: memory.md
  - Agents: agents.md
  - Deployment: deployment.md
  - Security: security.md
  - SDK: sdk.md
  - Examples:
      - Chatbot: examples/chatbot.md
      - Code Assistant: examples/code_assistant.md
      - Enterprise Search: examples/enterprise_search.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sambhavdwivediofficial/NeuralCore
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/sambhavdwivedi
    - icon: fontawesome/solid/globe
      link: https://www.sambhavdwivedi.in
